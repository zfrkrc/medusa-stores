services:
  # 1. Hobby Storefront
  hobby-storefront:
    build:
      context: ./hobby-store
      dockerfile: Dockerfile
    container_name: hobby-storefront
    volumes:
      - hobby-store-node_modules:/app/node_modules
      - hobby-next-build:/app/.next
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://hobby-backend:7001
      - MEDUSA_BACKEND_URL=http://hobby-backend:7001
      - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${HOBBY_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_STORE_ID=hobby
    ports:
      - "8001:8000"
    restart: always
    networks:
      - hobby-network

  # 2. Clay Storefront
  clay-storefront:
    build:
      context: ./clay-store
      dockerfile: Dockerfile
    container_name: clay-storefront
    volumes:
      - clay-store-node_modules:/app/node_modules
      - clay-next-build:/app/.next
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://hobby-backend:7001
      - MEDUSA_BACKEND_URL=http://hobby-backend:7001
      - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${CLAY_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_STORE_ID=clay
    ports:
      - "8002:8000"
    restart: always
    networks:
      - hobby-network

  # 3. Sedefli Storefront
  sedefli-storefront:
    build:
      context: ./sedefli-store
      dockerfile: Dockerfile
    container_name: sedefli-storefront
    volumes:
      - sedefli-store-node_modules:/app/node_modules
      - sedefli-next-build:/app/.next
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://hobby-backend:7001
      - MEDUSA_BACKEND_URL=http://hobby-backend:7001
      - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${SEDEFLI_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_STORE_ID=sedefli
    ports:
      - "8003:8000"
    restart: always
    networks:
      - hobby-network

networks:
  hobby-network:
    external: true

volumes:
  hobby-store-node_modules:
  hobby-next-build:
  clay-store-node_modules:
  clay-next-build:
  sedefli-store-node_modules:
  sedefli-next-build:
